<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GymLog</title>
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #18181a;
    --surface2: #212124;
    --border: rgba(255,255,255,.08);
    --border2: rgba(255,255,255,.14);
    --text: #f0f0ee;
    --muted: #888884;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,.12);
    --accent-dark: #8aaa30;
    --danger: #e05252;
    --radius: 10px;
    --radius-sm: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* Layout */
  #app { max-width: 680px; margin: 0 auto; padding: 0 1rem 4rem; }
  .topbar { display: flex; align-items: center; gap: .75rem; padding: 1.25rem 0 1rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1.25rem; }
  .topbar .logo { font-size: 18px; font-weight: 700; letter-spacing: -.5px; color: var(--accent); flex: 1; }
  .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); margin-bottom: 1rem; flex-wrap: wrap; }
  .bc-link { color: var(--accent); cursor: pointer; } .bc-link:hover { text-decoration: underline; }
  .bc-sep { color: var(--border2); }
  h2 { font-size: 20px; font-weight: 600; letter-spacing: -.3px; margin-bottom: 1.25rem; }
  .screen { display: none; } .screen.active { display: block; }

  /* Cards / list items */
  .list-item { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1rem; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: .5rem; cursor: pointer; transition: border-color .15s, background .15s; }
  .list-item:hover { border-color: var(--border2); background: var(--surface2); }
  .item-name { font-weight: 500; font-size: 14px; }
  .item-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .chevron { color: var(--muted); font-size: 14px; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; line-height: 1.7; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.1rem; margin-bottom: .75rem; }

  /* Buttons */
  .btn { background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 7px 14px; font-size: 13px; cursor: pointer; color: var(--text); font-family: inherit; transition: background .12s, border-color .12s; }
  .btn:hover { background: var(--surface2); border-color: rgba(255,255,255,.22); }
  .btn:active { transform: scale(.98); }
  .btn-accent { background: var(--accent); color: #111; border-color: var(--accent); font-weight: 600; }
  .btn-accent:hover { background: #d4f56a; border-color: #d4f56a; }
  .btn-sm { padding: 4px 9px; font-size: 12px; }
  .btn-ghost { border-color: transparent; color: var(--muted); }
  .btn-ghost:hover { color: var(--text); background: var(--surface2); border-color: var(--border); }
  .btn-danger { border-color: transparent; color: var(--danger); }
  .btn-danger:hover { background: rgba(224,82,82,.1); border-color: var(--danger); }
  .row { display: flex; gap: 8px; align-items: center; }
  .row > * { flex: 1; } .row > .btn { flex: none; } .row > .btn-sm { flex: none; }
  .flex-end { display: flex; justify-content: flex-end; gap: 8px; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }

  /* Inputs */
  input, select, textarea { background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 7px 10px; font-size: 13px; color: var(--text); font-family: inherit; width: 100%; outline: none; transition: border-color .12s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  input[type="date"] { color-scheme: dark; }
  select option { background: #222; }
  input[readonly] { opacity: .5; cursor: default; }

  /* Labels */
  .label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin: .9rem 0 .35rem; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 99px; background: var(--surface2); color: var(--muted); border: 0.5px solid var(--border); margin: 2px; }
  .chip { font-size: 12px; padding: 4px 10px; border-radius: 99px; border: 0.5px solid var(--border2); cursor: pointer; color: var(--muted); background: transparent; display: inline-block; margin: 2px; transition: background .1s; }
  .chip:hover { color: var(--text); border-color: rgba(255,255,255,.3); }
  .chip.on { background: var(--accent); color: #111; border-color: var(--accent); font-weight: 600; }

  /* Day tabs */
  .day-tabs-wrap { overflow-x: auto; margin-bottom: 1rem; padding-bottom: 2px; }
  .day-tabs-wrap::-webkit-scrollbar { height: 2px; } .day-tabs-wrap::-webkit-scrollbar-thumb { background: var(--border2); }
  .day-tabs { display: flex; gap: 5px; min-width: max-content; }
  .day-tab { padding: 5px 13px; font-size: 12px; border-radius: var(--radius-sm); cursor: pointer; border: 0.5px solid var(--border); color: var(--muted); white-space: nowrap; background: transparent; transition: all .12s; }
  .day-tab:hover { border-color: var(--border2); color: var(--text); }
  .day-tab.active { background: var(--accent); color: #111; border-color: var(--accent); font-weight: 600; }

  /* Exercise table */
  .ex-block { margin-bottom: 1.1rem; }
  .ex-header { display: flex; align-items: center; gap: 8px; padding: .45rem .65rem; background: var(--surface2); border-radius: var(--radius-sm); margin-bottom: .4rem; border-left: 2.5px solid var(--accent); }
  .ex-header .ex-name { font-weight: 600; font-size: 14px; flex: 1; color: var(--text); }
  .ex-meta { font-size: 11px; color: var(--muted); }
  .ex-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .ex-table th { font-size: 10px; font-weight: 600; color: var(--muted); text-align: left; padding: 4px 5px; border-bottom: 0.5px solid var(--border); text-transform: uppercase; letter-spacing: .04em; }
  .ex-table td { padding: 3px 4px; vertical-align: middle; border-bottom: 0.5px solid var(--border); }
  .ex-table tr:last-child td { border-bottom: none; }
  .ex-table input, .ex-table select { padding: 4px 6px; font-size: 12px; }
  .set-num { color: var(--muted); font-size: 11px; width: 22px; text-align: center; }

  /* Progress */
  .prog-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: .85rem 1rem; margin-bottom: .6rem; }
  .prog-ex-name { font-weight: 600; font-size: 14px; margin-bottom: .6rem; }
  .prog-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .prog-table th { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; padding: 3px 5px; border-bottom: 0.5px solid var(--border); }
  .prog-table td { padding: 5px 5px; border-bottom: 0.5px solid var(--border); }
  .prog-table tr:last-child td { border-bottom: none; }
  .prog-up { color: var(--accent); font-weight: 600; }
  .prog-down { color: var(--danger); }
  .prog-same { color: var(--muted); }
  .prog-summary { display: flex; gap: 8px; margin-bottom: .75rem; }
  .prog-stat { flex: 1; background: var(--surface2); border-radius: var(--radius-sm); padding: .6rem .75rem; text-align: center; }
  .prog-stat-val { font-size: 18px; font-weight: 700; color: var(--accent); }
  .prog-stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }

  /* Session header strip */
  .session-strip { display: flex; align-items: center; gap: .5rem; margin-bottom: .85rem; flex-wrap: wrap; }
  .session-strip .muscle-tag { font-size: 11px; padding: 3px 8px; border-radius: 99px; background: var(--accent-dim); color: var(--accent); border: 0.5px solid rgba(200,240,96,.25); }
  .session-strip-actions { display: flex; gap: 6px; margin-left: auto; }

  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 400px; border: 0.5px solid var(--border2); max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
  .modal-note { font-size: 12px; color: var(--muted); margin-bottom: .75rem; line-height: 1.5; }

  /* Plan builder */
  .plan-ex-item { background: var(--surface2); border-radius: var(--radius-sm); padding: .6rem .75rem; margin-bottom: .45rem; border: 0.5px solid var(--border); }
  .plan-ex-row { display: flex; gap: 6px; align-items: center; margin-bottom: .35rem; }
  .plan-ex-row input { flex: 1; }
  .plan-set-controls { font-size: 11px; color: var(--muted); display: flex; gap: 10px; }
  .plan-set-controls span { cursor: pointer; } .plan-set-controls span:hover { color: var(--text); }

  /* Readonly day */
  .readonly-note { font-size: 11px; color: var(--muted); text-align: right; margin-top: .4rem; font-style: italic; }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <span class="logo">GymLog</span>
    <button class="btn btn-sm btn-ghost" onclick="exportData()" title="Export data" style="font-size:12px">⬇ Export</button>
    <label class="btn btn-sm btn-ghost" style="cursor:pointer;font-size:12px" title="Import data">⬆ Import<input type="file" accept=".json" onchange="importData(event)" style="display:none" /></label>
  </div>
  <div id="import-msg" style="display:none;font-size:12px;padding:6px 10px;border-radius:var(--radius-sm);margin-bottom:.75rem"></div>
  <div id="breadcrumb" class="breadcrumb"></div>
  <h2 id="page-title">My splits</h2>

  <div id="s-home" class="screen active">
    <div id="splits-list"></div>
    <button class="btn" onclick="openModal('split')">+ New split</button>
  </div>

  <div id="s-split" class="screen">
    <div id="sessions-list"></div>
    <button class="btn" onclick="openModal('session')">+ New session</button>
  </div>

  <div id="s-session" class="screen">
    <div class="session-strip" id="session-strip">
      <div class="session-strip-actions">
        <button class="btn btn-sm btn-ghost" onclick="openModal('edit-plan')">✎ Edit plan</button>
        <button class="btn btn-sm btn-accent" onclick="openModal('add-day')">+ Log new day</button>
      </div>
    </div>
    <div class="day-tabs-wrap"><div class="day-tabs" id="day-tabs"></div></div>
    <div id="day-content"></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>

<script>
const SK = 'gymlog_v1';
const MUSCLES = ['Chest','Shoulders','Triceps','Back','Biceps','Forearms','Quads','Hamstrings','Glutes','Calves','Core','Traps'];
const TECHNIQUES = ['—','Drop set','Superset','Giant set','Rest-pause','Myo Reps','Mechanical drop','Pre-exhaust','Pause reps','Tempo','Cluster set','1½ reps','Forced reps'];

let DB = { splits: [] };
let nav = { splitId: null, sessionId: null, dayIdx: 0 };
let _selMuscles = [];
let _planExercises = [];

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function fmt(d) { return new Date(d + 'T12:00:00').toLocaleDateString('en-CA', { month: 'short', day: 'numeric' }); }
function fmtFull(d) { return new Date(d + 'T12:00:00').toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' }); }
function load() { try { const d = localStorage.getItem(SK); if (d) DB = JSON.parse(d); } catch (e) {} }
function save() { try { localStorage.setItem(SK, JSON.stringify(DB)); } catch (e) {} }
function getSplit(id) { return DB.splits.find(s => s.id === (id || nav.splitId)); }
function getSession(id) { const sp = getSplit(); return sp && sp.sessions.find(s => s.id === (id || nav.sessionId)); }

/* ── SCREENS ── */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + name).classList.add('active');
}
function setBreadcrumb(parts) {
  document.getElementById('breadcrumb').innerHTML = parts.map((p, i) =>
    i < parts.length - 1
      ? `<span class="bc-link" onclick="${p.fn}">${p.label}</span><span class="bc-sep">›</span>`
      : `<span>${p.label}</span>`
  ).join('');
}
function setTitle(t) { document.getElementById('page-title').textContent = t; }

/* ── HOME ── */
function renderHome() {
  nav = { splitId: null, sessionId: null, dayIdx: 0 };
  setTitle('My splits');
  document.getElementById('breadcrumb').innerHTML = '';
  const el = document.getElementById('splits-list');
  if (!DB.splits.length) {
    el.innerHTML = '<div class="empty">No splits yet.<br>Create your first one below.</div>';
  } else {
    el.innerHTML = DB.splits.map(sp => {
      const totalLogs = sp.sessions.reduce((a, s) => a + (s.days || []).length, 0);
      return `<div class="list-item" onclick="renderSplit('${sp.id}')" style="cursor:pointer">
        <div style="flex:1;min-width:0">
          <div class="item-name">${sp.name}</div>
          <div class="item-meta">${sp.sessions.length} session${sp.sessions.length !== 1 ? 's' : ''} · ${totalLogs} total logs</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button onclick="event.stopPropagation();deleteSplitConfirm('${sp.id}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px 6px;line-height:1;border-radius:var(--radius-sm)" title="Delete split">&#x2715;</button>
          <span class="chevron">›</span>
        </div>
      </div>`;
    }).join('');
  }
  showScreen('home');
}

/* ── SPLIT ── */
function renderSplit(id) {
  nav.splitId = id; nav.sessionId = null;
  const sp = getSplit();
  setTitle(sp.name);
  setBreadcrumb([{ label: 'Splits', fn: 'renderHome()' }, { label: sp.name }]);
  const el = document.getElementById('sessions-list');
  if (!sp.sessions.length) {
    el.innerHTML = '<div class="empty">No sessions yet.<br>Add one below to get started.</div>';
  } else {
    el.innerHTML = sp.sessions.map(se => {
      const days = se.days || [];
      const last = days.length ? fmtFull(days[days.length - 1].date) : 'Never logged';
      return `<div class="list-item" onclick="renderSession('${se.id}')">
        <div>
          <div class="item-name">${se.name}</div>
          <div class="item-meta">${(se.muscles || []).join(' · ') || 'No muscles set'} &nbsp;·&nbsp; ${days.length} day${days.length !== 1 ? 's' : ''} logged &nbsp;·&nbsp; Last: ${last}</div>
        </div>
        <span class="chevron">›</span>
      </div>`;
    }).join('');
  }
  showScreen('split');
}

/* ── SESSION ── */
function renderSession(id, dayIdx) {
  nav.sessionId = id;
  const sp = getSplit(); const se = getSession();
  setTitle(se.name);
  setBreadcrumb([
    { label: 'Splits', fn: 'renderHome()' },
    { label: sp.name, fn: `renderSplit('${sp.id}')` },
    { label: se.name }
  ]);
  nav.dayIdx = dayIdx != null ? dayIdx : (se.days && se.days.length ? se.days.length - 1 : 0);
  // Muscle tags
  const strip = document.getElementById('session-strip');
  const tags = (se.muscles || []).map(m => `<span class="muscle-tag">${m}</span>`).join('');
  strip.innerHTML = tags + `<div class="session-strip-actions">
    <button class="btn btn-sm btn-ghost" onclick="openModal('edit-plan')">✎ Edit plan</button>
    <button class="btn btn-sm btn-accent" onclick="openModal('add-day')">+ Log new day</button>
  </div>`;
  renderDayTabs();
  showScreen('session');
}

function renderDayTabs() {
  const se = getSession();
  const days = se.days || [];
  document.getElementById('day-tabs').innerHTML = days.map((d, i) =>
    `<div style="display:flex;align-items:center;gap:0">
      <div class="day-tab ${i === nav.dayIdx ? 'active' : ''}" onclick="switchDay(${i})" style="border-radius:var(--radius-sm) 0 0 var(--radius-sm);border-right:none">
        Day ${i + 1} <span style="opacity:.65;font-size:10px;margin-left:2px">${fmt(d.date)}</span>
      </div>
      <div class="day-tab ${i === nav.dayIdx ? 'active' : ''}" onclick="deleteDayConfirm(${i})" style="border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:5px 7px;opacity:.7" title="Delete day">x</div>
    </div>`
  ).join('');
  renderDayContent();
}

function deleteDayConfirm(i) {
  nav.dayIdx = i;
  renderDayTabs();
  document.getElementById('day-content').innerHTML = `
    <div style="background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:.75rem">
      <div style="font-weight:500;margin-bottom:.5rem">Delete Day ` + (i+1) + `?</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:1rem">This log entry will be permanently removed.</div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" onclick="renderDayTabs()">Cancel</button>
        <button class="btn btn-sm" style="border-color:var(--danger);color:var(--danger)" onclick="deleteDayConfirm2(` + i + `)">Delete</button>
      </div>
    </div>`;
}

function deleteDayConfirm2(i) {
  document.getElementById('day-content').innerHTML = `
    <div style="background:var(--surface);border:0.5px solid var(--danger);border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:.75rem">
      <div style="font-size:12px;color:var(--danger);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem">Are you really sure?</div>
      <div style="font-weight:500;margin-bottom:.4rem">This cannot be undone.</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:1rem">Day ` + (i+1) + ` and all its logged data will be gone forever.</div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" onclick="renderDayTabs()">Cancel</button>
        <button class="btn btn-sm" style="background:var(--danger);color:#fff;border-color:var(--danger)" onclick="deleteDay(` + i + `)">Yes, delete everything</button>
      </div>
    </div>`;
}

function switchDay(i) { nav.dayIdx = i; renderDayTabs(); }

function renderDayContent() {
  const se = getSession();
  const days = se.days || [];
  const el = document.getElementById('day-content');
  if (!days.length) {
    el.innerHTML = '<div class="empty">No days logged yet.<br>Hit "+ Log new day" to record your first session.</div>'; return;
  }
  if (!se.plan || !se.plan.length) {
    el.innerHTML = '<div class="empty">No exercise plan set.<br>Use "Edit plan" to define your exercises first.</div>'; return;
  }
  const day = days[nav.dayIdx];
  const plan = day.planSnapshot || se.plan;
  const isLast = nav.dayIdx === days.length - 1;

  let html = `<div style="font-size:12px;color:var(--muted);margin-bottom:.85rem">
    📅 ${fmtFull(day.date)}
    ${isLast ? '<span style="font-size:11px;background:var(--accent-dim);color:var(--accent);padding:2px 7px;border-radius:99px;margin-left:8px;border:0.5px solid rgba(200,240,96,.25)">Current</span>' : ''}
  </div>`;

  plan.forEach((ex, ei) => {
    const saved = (day.exercises && day.exercises[ei]) || { sets: ex.sets.map(() => ({ reps: '', note: '', weight: '', rest: '', technique: '' })) };
    html += `<div class="ex-block">
      <div class="ex-header">
        <span class="ex-name">${ex.name}</span>
        <span class="ex-meta">${ex.sets.length} set${ex.sets.length !== 1 ? 's' : ''}</span>
      </div>
      <table class="ex-table">
        <thead><tr>
          <th style="width:22px">#</th>
          <th>Reps</th>
          <th>Note</th>
          <th>kg</th>
          <th>Rest (s)</th>
          <th>Technique</th>
        </tr></thead><tbody>`;
    ex.sets.forEach((_, si) => {
      const s = (saved.sets && saved.sets[si]) || { reps: '', note: '', weight: '', rest: '', technique: '' };
      if (isLast) {
        html += `<tr>
          <td class="set-num">${si + 1}</td>
          <td><input type="number" min="0" value="${s.reps}" placeholder="—" oninput="setVal(${ei},${si},'reps',this.value)" /></td>
          <td><input value="${s.note}" placeholder="2RIR, failure…" oninput="setVal(${ei},${si},'note',this.value)" /></td>
          <td><input type="number" min="0" step="0.5" value="${s.weight}" placeholder="—" oninput="setVal(${ei},${si},'weight',this.value)" /></td>
          <td><input type="number" min="0" value="${s.rest}" placeholder="—" oninput="setVal(${ei},${si},'rest',this.value)" /></td>
          <td><select onchange="setVal(${ei},${si},'technique',this.value)">${TECHNIQUES.map(t => `<option value="${t}" ${s.technique === t ? 'selected' : ''}>${t}</option>`).join('')}</select></td>
        </tr>`;
      } else {
        html += `<tr>
          <td class="set-num">${si + 1}</td>
          <td><input readonly value="${s.reps || '—'}" /></td>
          <td><input readonly value="${s.note || ''}" /></td>
          <td><input readonly value="${s.weight ? s.weight + ' kg' : '—'}" /></td>
          <td><input readonly value="${s.rest ? s.rest + 's' : '—'}" /></td>
          <td style="font-size:11px;color:var(--muted)">${s.technique && s.technique !== '—' ? s.technique : '—'}</td>
        </tr>`;
      }
    });
    html += `</tbody></table></div>`;
  });

  if (isLast) {
    html += `<div class="flex-end" style="margin-top:.5rem;gap:8px">
      <button class="btn btn-sm btn-accent" onclick="saveDay()">✓ Save</button>
    </div>`;
  } else {
    html += `<div class="readonly-note">Past log — read only</div>`;
  }
  el.innerHTML = html;
}

function setVal(ei, si, field, val) {
  const se = getSession(); const day = se.days[nav.dayIdx];
  const plan = day.planSnapshot || se.plan;
  if (!day.exercises) day.exercises = {};
  if (!day.exercises[ei]) day.exercises[ei] = { sets: plan[ei].sets.map(() => ({ reps: '', note: '', weight: '', rest: '', technique: '' })) };
  if (!day.exercises[ei].sets[si]) day.exercises[ei].sets[si] = {};
  day.exercises[ei].sets[si][field] = val;
}

function saveDay() { save(); renderDayTabs(); }

function deleteDay(i) {
  const se = getSession();
  se.days.splice(i, 1); save();
  const newIdx = Math.max(0, Math.min(i, se.days.length - 1));
  renderSession(se.id, se.days.length ? newIdx : null);
}

/* ── MODALS ── */
function openModal(type) {
  const body = document.getElementById('modal-body');

  if (type === 'split') {
    body.innerHTML = `<h3>New split</h3>
      <div class="label">Name</div>
      <input id="m-split-name" placeholder="e.g. Push / Pull / Legs" />
      <div class="flex-end" style="margin-top:1.25rem">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-accent" onclick="createSplit()">Create</button>
      </div>`;
  }

  else if (type === 'session') {
    _selMuscles = []; _planExercises = [];
    body.innerHTML = `<h3>New session</h3>
      <div class="label">Session name</div>
      <input id="m-ses-name" placeholder="e.g. Push A, Pull, Legs…" />
      <div class="label">Muscles trained</div>
      <div id="m-muscle-chips">${MUSCLES.map(m => `<span class="chip" onclick="toggleM(this,'${m}')">${m}</span>`).join('')}</div>
      <div class="row" style="margin-top:.4rem">
        <input id="m-custom-m" placeholder="Custom muscle…" />
        <button class="btn btn-sm" onclick="addCustomM()">Add</button>
      </div>
      <div id="m-sel-muscles" style="margin-top:.35rem;font-size:12px;color:var(--muted)"></div>
      <div class="label" style="margin-top:.9rem">Exercise plan</div>
      <div class="modal-note">Define your exercises once. Every day you log will use this list.</div>
      <div id="m-plan-list"></div>
      <button class="btn btn-sm" style="margin-bottom:.85rem" onclick="addPlanEx()">+ Add exercise</button>
      <div class="flex-end">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-accent" onclick="createSession()">Create session</button>
      </div>`;
    renderPlanList();
  }

  else if (type === 'edit-plan') {
    const se = getSession();
    const day = se.days && se.days[nav.dayIdx];
    const sourcePlan = day ? (day.planSnapshot || se.plan) : se.plan;
    _planExercises = JSON.parse(JSON.stringify(sourcePlan || []));
    _selMuscles = [...(se.muscles || [])];
    const scope = day ? `Day ${nav.dayIdx + 1}` : 'all future days';
    body.innerHTML = `<h3>Edit plan — ${scope}</h3>
      <div class="modal-note">Changes apply to <strong>${scope}</strong> only. Other days are not affected.</div>
      <div class="label">Muscles trained</div>
      <div>${MUSCLES.map(m => `<span class="chip ${_selMuscles.includes(m) ? 'on' : ''}" onclick="toggleM(this,'${m}')">${m}</span>`).join('')}</div>
      <div class="row" style="margin-top:.4rem">
        <input id="m-custom-m" placeholder="Custom muscle…" />
        <button class="btn btn-sm" onclick="addCustomM()">Add</button>
      </div>
      <div id="m-sel-muscles" style="margin-top:.35rem;font-size:12px;color:var(--muted)">${_selMuscles.join(', ')}</div>
      <div class="label" style="margin-top:.9rem">Exercises</div>
      <div id="m-plan-list"></div>
      <button class="btn btn-sm" style="margin-bottom:.85rem" onclick="addPlanEx()">+ Add exercise</button>
      <div class="flex-end">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-accent" onclick="savePlan()">Save</button>
      </div>`;
    renderPlanList();
  }

  else if (type === 'add-day') {
    const se = getSession();
    if (!se.plan || !se.plan.length) {
      body.innerHTML = `<h3>No exercise plan</h3>
        <p class="modal-note">Set up an exercise plan first using "Edit plan".</p>
        <div class="flex-end"><button class="btn btn-accent" onclick="closeModal()">OK</button></div>`;
      document.getElementById('modal-bg').classList.add('open'); return;
    }
    body.innerHTML = `<h3>Log new day</h3>
      <div class="label">Date</div>
      <input type="date" id="m-day-date" value="${new Date().toISOString().slice(0, 10)}" />
      <div class="flex-end" style="margin-top:1.25rem">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-accent" onclick="addDay()">Start logging</button>
      </div>`;
  }

  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

function toggleM(el, m) {
  if (_selMuscles.includes(m)) { _selMuscles = _selMuscles.filter(x => x !== m); el.classList.remove('on'); }
  else { _selMuscles.push(m); el.classList.add('on'); }
  const sd = document.getElementById('m-sel-muscles'); if (sd) sd.textContent = _selMuscles.join(', ');
}
function addCustomM() {
  const inp = document.getElementById('m-custom-m'); const v = inp.value.trim();
  if (v && !_selMuscles.includes(v)) _selMuscles.push(v);
  const sd = document.getElementById('m-sel-muscles'); if (sd) sd.textContent = _selMuscles.join(', ');
  inp.value = '';
}

function addPlanEx() { _planExercises.push({ name: '', sets: [{}] }); renderPlanList(); }
function removePlanEx(i) { _planExercises.splice(i, 1); renderPlanList(); }
function movePlanEx(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= _planExercises.length) return;
  [_planExercises[i], _planExercises[j]] = [_planExercises[j], _planExercises[i]]; renderPlanList();
}
function addPlanSet(ei) { _planExercises[ei].sets.push({}); renderPlanList(); }
function remPlanSet(ei) { if (_planExercises[ei].sets.length > 1) { _planExercises[ei].sets.pop(); renderPlanList(); } }

function renderPlanList() {
  const el = document.getElementById('m-plan-list'); if (!el) return;
  el.innerHTML = _planExercises.map((ex, ei) => `
    <div class="plan-ex-item">
      <div class="plan-ex-row">
        <input placeholder="Exercise name…" value="${ex.name}" oninput="_planExercises[${ei}].name=this.value" />
        <button class="btn btn-sm btn-ghost" onclick="movePlanEx(${ei},-1)" ${ei === 0 ? 'disabled' : ''}>↑</button>
        <button class="btn btn-sm btn-ghost" onclick="movePlanEx(${ei},1)" ${ei === _planExercises.length - 1 ? 'disabled' : ''}>↓</button>
        <button class="btn btn-sm btn-danger" onclick="removePlanEx(${ei})">×</button>
      </div>
      <div class="plan-set-controls">
        <span>${ex.sets.length} set${ex.sets.length !== 1 ? 's' : ''}</span>
        ${ex.sets.length > 1 ? `<span onclick="remPlanSet(${ei})">− set</span>` : ''}
        <span onclick="addPlanSet(${ei})">+ set</span>
      </div>
    </div>`).join('');
}

function deleteSplitConfirm(id) {
  const sp = DB.splits.find(s => s.id === id);
  const el = document.getElementById('splits-list');
  const totalLogs = sp.sessions.reduce((a, s) => a + (s.days || []).length, 0);
  el.innerHTML = `
    <div style="background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:.75rem">
      <div style="font-weight:500;margin-bottom:.4rem">Delete "${sp.name}"?</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:1rem">${sp.sessions.length} session${sp.sessions.length !== 1 ? 's' : ''} and ${totalLogs} log${totalLogs !== 1 ? 's' : ''} will be permanently removed.</div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" onclick="renderHome()">Cancel</button>
        <button class="btn btn-sm" style="border-color:var(--danger);color:var(--danger)" onclick="deleteSplitConfirm2('${id}')">Delete</button>
      </div>
    </div>`;
}

function deleteSplitConfirm2(id) {
  const sp = DB.splits.find(s => s.id === id);
  const el = document.getElementById('splits-list');
  el.innerHTML = `
    <div style="background:var(--surface);border:0.5px solid var(--danger);border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:.75rem">
      <div style="font-size:12px;color:var(--danger);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem">Are you really sure?</div>
      <div style="font-weight:500;margin-bottom:.4rem">This cannot be undone.</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:1rem">All data for <strong style="color:var(--text)">${sp.name}</strong> will be gone forever.</div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" onclick="renderHome()">Cancel</button>
        <button class="btn btn-sm" style="background:var(--danger);color:#fff;border-color:var(--danger)" onclick="deleteSplit('${id}')">Yes, delete everything</button>
      </div>
    </div>`;
}

function deleteSplit(id) {
  DB.splits = DB.splits.filter(s => s.id !== id);
  save();
  renderHome();
}

function createSplit() {
  const n = document.getElementById('m-split-name').value.trim(); if (!n) return;
  DB.splits.push({ id: uid(), name: n, sessions: [] });
  save(); closeModal(); renderHome();
}

function createSession() {
  const n = document.getElementById('m-ses-name').value.trim(); if (!n) return;
  const plan = _planExercises.filter(e => e.name.trim()).map(e => ({ ...e, sets: [...e.sets] }));
  getSplit().sessions.push({ id: uid(), name: n, muscles: [..._selMuscles], plan, days: [] });
  save(); closeModal(); renderSplit(nav.splitId);
}

function savePlan() {
  const se = getSession();
  const newPlan = _planExercises.filter(e => e.name.trim()).map(e => ({ ...e, sets: [...e.sets] }));
  const day = se.days && se.days[nav.dayIdx];
  if (day) {
    day.planSnapshot = newPlan;
  } else {
    se.plan = newPlan;
  }
  se.muscles = [..._selMuscles];
  save(); closeModal(); renderSession(se.id, nav.dayIdx);
}

function addDay() {
  const dateVal = document.getElementById('m-day-date').value;
  const se = getSession();
  const planSnapshot = JSON.parse(JSON.stringify(se.plan || []));
  se.days.push({ date: dateVal, exercises: {}, planSnapshot });
  save(); closeModal();
  renderSession(se.id, se.days.length - 1);
}

function exportData() {
  const json = JSON.stringify(DB, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gymlog-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.splits || !Array.isArray(parsed.splits)) throw new Error('Invalid format');
      DB = parsed;
      save();
      renderHome();
      showImportMsg('✓ Data imported successfully!', 'var(--accent)', '#111');
    } catch(err) {
      showImportMsg('✗ Import failed: invalid file.', 'var(--danger)', '#fff');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function showImportMsg(msg, bg, color) {
  const el = document.getElementById('import-msg');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = bg;
  el.style.color = color;
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

load(); renderHome();
</script>
</body>
</html>
